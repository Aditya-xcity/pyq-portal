<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XVelocity - Study Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
      background: #0b0f1c;  /* deep deepseek dark base */
      padding: 2rem 1.5rem;
      min-height: 100vh;
      color: #e8edf5;
    }

    /* smooth dark scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e2538;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3a445c;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #556180;
    }

    .drive-container {
      max-width: 1200px;
      margin: 0 auto;
      background: #0f1322;      /* rich dark card */
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(66, 153, 225, 0.08);
      backdrop-filter: blur(0px);
      padding: 1.8rem 2rem 2.2rem 2rem;
      transition: all 0.2s ease;
    }

    /* header section */
    .drive-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #252e42;
    }

    .drive-title {
      font-size: 1.9rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e0f2fe 0%, #b3d9ff 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .drive-title::before {
      content: "🧠";
      font-size: 1.8rem;
      background: none;
      color: #70b9ff;
    }

    .search-wrapper {
      position: relative;
    }

    .search-input {
      background: #0a0e18;
      border: 1px solid #2a334c;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      border-radius: 60px;
      width: 260px;
      font-size: 0.9rem;
      color: #edf2fc;
      transition: all 0.2s;
      outline: none;
      font-weight: 450;
    }

    .search-input:focus {
      border-color: #3e6bdb;
      box-shadow: 0 0 0 2px rgba(62, 107, 219, 0.3);
      background: #0f1525;
    }

    .search-input::placeholder {
      color: #5b6b8c;
      font-weight: 400;
    }

    .search-wrapper::before {
      content: "🔍";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      opacity: 0.7;
      pointer-events: none;
    }

    /* summary card - modern glassmorph */
    .summary {
      background: linear-gradient(120deg, #11182c, #0c1122);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #283049;
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      font-size: 1rem;
      color: #bdd3ff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .summary:before {
      content: "⚡";
      font-size: 1.3rem;
      filter: drop-shadow(0 0 2px #4080ff);
    }

    .menu-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 1.4rem;
      position: relative;
    }

    .menu-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.85rem 1rem;
      border-radius: 16px;
      border: 1px solid #25304a;
      background: linear-gradient(135deg, #11182c, #0a1020);
      color: #edf3ff;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .menu-btn:hover {
      transform: translateY(-1px);
      border-color: #4c7fff;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
    }

    .menu-icon {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      width: 18px;
    }

    .menu-icon span {
      display: block;
      height: 2px;
      width: 100%;
      border-radius: 999px;
      background: #dbe7ff;
    }

    .menu-text {
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 0.7rem);
      right: 0;
      min-width: 220px;
      padding: 0.5rem;
      border-radius: 18px;
      border: 1px solid #27324a;
      background: rgba(10, 14, 24, 0.98);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      display: none;
      z-index: 20;
    }

    .menu-panel.is-open {
      display: block;
    }

    .menu-option {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      color: #edf3ff;
      text-decoration: none;
      background: transparent;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .menu-option:hover {
      background: #101936;
      transform: translateX(2px);
    }

    .menu-option__icon {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #172544, #0f1730);
      border: 1px solid #2d3b5f;
      flex-shrink: 0;
    }

    .menu-option__text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.12rem;
    }

    .menu-option__label {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .menu-option__desc {
      font-size: 0.75rem;
      color: #8a9abd;
      line-height: 1.2;
    }

    /* table design - clean, dark, minimal */
    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 20px;
      overflow: hidden;
    }

    th {
      text-align: left;
      padding: 1rem 0.8rem 0.9rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8e9fc3;
      border-bottom: 1px solid #282f44;
      background: transparent;
    }

    td {
      padding: 1rem 0.8rem;
      border-bottom: 1px solid #1e253a;
      font-size: 0.95rem;
      font-weight: 450;
      color: #dee9fc;
      transition: all 0.2s;
    }

    tr {
      transition: 0.1s linear;
      border-radius: 14px;
    }

    tr:hover {
      background: #141b2f;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px #2e3a58;
    }

    /* folder icon styling */
    .folder-icon {
      font-size: 1.25rem;
      margin-right: 12px;
      filter: drop-shadow(0 0 1px #5588ee);
      display: inline-block;
      vertical-align: middle;
    }

    .file-name {
      display: flex;
      align-items: center;
      font-weight: 500;
    }

    .type-badge {
      background: #19203b;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-block;
      color: #b4ccff;
      letter-spacing: 0.3px;
      border: 0.5px solid #2c385a;
    }

    .modified-text {
      color: #8f9fc7;
      font-size: 0.85rem;
    }

    /* micro interaction: ripple effect on click */
    tr {
      position: relative;
      overflow: hidden;
    }

    /* empty state for search */
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: #6f81ab;
      font-size: 0.95rem;
      background: #0a1020;
      border-radius: 28px;
      margin-top: 1rem;
    }

    /* subtle footer / extra style */
    .drive-footer {
      margin-top: 2rem;
      text-align: right;
      font-size: 0.7rem;
      color: #475a7c;
      border-top: 1px solid #20273e;
      padding-top: 1.2rem;
    }

    /* responsive touches */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .drive-container {
        padding: 1.2rem;
      }
      .drive-title {
        font-size: 1.5rem;
      }
      .search-input {
        width: 100%;
      }
      td, th {
        padding: 0.8rem 0.5rem;
      }
      .type-badge {
        padding: 2px 8px;
      }
    }

    /* custom focus & active states */
    tr:active {
      background: #1c2542;
      transform: scale(0.99);
      transition: 0.02s;
    }

    a, .drive-link {
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="drive-container">
  <div class="drive-header">
    <div class="drive-title">
      Aditya Bhardwaj
    </div>
    <div class="search-wrapper">
      <input type="text" class="search-input" id="searchInput" placeholder="Search folders...">
    </div>
  </div>

  <div class="summary">
    📂 Lab repository · instant access
  </div>

  <div class="menu-bar">
    <button class="menu-btn" id="menuBtn" type="button" aria-expanded="false" aria-controls="menuPanel">
      <div class="menu-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <span class="menu-text">MENU</span>
    </button>
    <div class="menu-panel" id="menuPanel" role="menu" aria-label="Menu options">
      <a class="menu-option" href="https://aditya-xcity.github.io/pyq-portal/website/index.html" target="_blank" rel="noopener noreferrer" role="menuitem">
        <span class="menu-option__icon">📘</span>
        <span class="menu-option__text">
          <span class="menu-option__label">PYQ Portal</span>
          <span class="menu-option__desc">Open the previous year questions site</span>
        </span>
      </a>
    </div>
  </div>

  <div style="overflow-x: auto; border-radius: 20px;">
    <table id="driveTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Modified</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- folders data will be injected both static & dynamic, but we keep full JS control for search -->
      </tbody>
    </table>
    <div id="emptyMessage" style="display: none;" class="no-results">
      ✨ No matching folders found — try another keyword
    </div>
  </div>
  <div class="drive-footer">
    <span>Everything you need, instantly.</span>
  </div>
</div>

<script>
  // ----- DARK THEME DEEPSEEK DRIVE with search & folder links -----
  // Original folder data (exactly same links + enriched metadata)
  const foldersData = [
    {
      name: "Microprocessor Lab",
      type: "Folder",
      modified: "Today",
      link: "https://drive.google.com/drive/folders/1CInCGKkQa9M-7wMOeKXarnfoqlHqR52x",
      icon: "📁",
      description: "8085, 8086 architectures"
    },
    {
      name: "Java Lab",
      type: "Folder",
      modified: "Today",
      link: "https://drive.google.com/drive/folders/148v7mEoyI4au3inyljSoNBcXMy5yduxO",
      icon: "📁",
      description: "OOP, multithreading, collections"
    },
    {
      name: "DAA Lab",
      type: "Folder",
      modified: "Today",
      link: "https://drive.google.com/drive/folders/1nwurabGNYJ6XQ6TdwUiitTgBEzwY5i_F",
      icon: "📁",
      description: "algorithms & complexity"
    }
  ];

  // additional optional: adding AI vibe? just pure dark style + functional.
  const tableBody = document.getElementById('tableBody');
  const searchInput = document.getElementById('searchInput');
  const emptyDiv = document.getElementById('emptyMessage');

  // helper: render table rows based on filtered array
  function renderTable(filteredItems) {
    if (!filteredItems.length) {
      tableBody.innerHTML = '';
      emptyDiv.style.display = 'block';
      return;
    }
    emptyDiv.style.display = 'none';
    // building rows
    let rowsHtml = '';
    for (let item of filteredItems) {
      rowsHtml += `
        <tr onclick="openDrive('${item.link}')" style="cursor: pointer;">
          <td>
            <div class="file-name">
              <span class="folder-icon">${item.icon}</span>
              <span>${escapeHtml(item.name)}</span>
            </div>
          </td>
          <td><span class="type-badge">📂 ${escapeHtml(item.type)}</span></td>
          <td><span class="modified-text">${escapeHtml(item.modified)}</span></td>
        </tr>
      `;
    }
    tableBody.innerHTML = rowsHtml;
  }

  // simple XSS protection
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // filter function based on search term (name, type, modified)
  function filterFolders() {
    const query = searchInput.value.trim().toLowerCase();
    if (query === "") {
      renderTable(foldersData);
      return;
    }
    const filtered = foldersData.filter(folder => {
      return folder.name.toLowerCase().includes(query) ||
             folder.type.toLowerCase().includes(query) ||
             folder.modified.toLowerCase().includes(query);
    });
    renderTable(filtered);
  }

  // debounce for smooth experience
  let debounceTimer;
  function onSearchInput() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      filterFolders();
    }, 180);
  }

  // initial render
  renderTable(foldersData);

  // attach event listener
  searchInput.addEventListener('input', onSearchInput);

  const menuBtn = document.getElementById('menuBtn');
  const menuPanel = document.getElementById('menuPanel');

  function closeMenu() {
    if (!menuBtn || !menuPanel) return;
    menuPanel.classList.remove('is-open');
    menuBtn.setAttribute('aria-expanded', 'false');
  }

  if (menuBtn && menuPanel) {
    menuBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      const isOpen = menuPanel.classList.toggle('is-open');
      menuBtn.setAttribute('aria-expanded', String(isOpen));
    });

    document.addEventListener('click', (event) => {
      if (!menuPanel.contains(event.target) && !menuBtn.contains(event.target)) {
        closeMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeMenu();
      }
    });
  }

  // expose openDrive function globally (as required for onclick)
  window.openDrive = function(link) {
    if (link && link.startsWith('http')) {
      window.open(link, '_blank', 'noopener,noreferrer');
    } else {
      console.warn("invalid link");
    }
  };

  // additional keyboard shortcut: pressing ESC clears search
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      filterFolders();
      searchInput.blur();
    }
  });

  // optional: add dynamic dark mode micro-tooltip for fun (already dark)
  // also add smooth row effect with hover animation via CSS
  // Table row context menu not needed.

  // extra: show total items count in summary, keeps the vibe (dark)
  const updateSummaryCount = () => {
    const visibleRows = document.querySelectorAll('#tableBody tr').length;
    const summaryDiv = document.querySelector('.summary');
    if (summaryDiv && !summaryDiv.innerHTML.includes('·')) {
      // preserve original rich info but we can append dynamic count
      const baseText = "📂 Lab repository · secure dark vault · instant access";
      if (visibleRows !== undefined) {
        // subtle update without overriding original design, but we add badge via dom?
        const existingSpan = summaryDiv.querySelector('.count-badge');
        if (!existingSpan) {
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'count-badge';
          badgeSpan.style.marginLeft = 'auto';
          badgeSpan.style.fontSize = '0.75rem';
          badgeSpan.style.background = '#1f2a48';
          badgeSpan.style.padding = '4px 10px';
          badgeSpan.style.borderRadius = '30px';
          summaryDiv.appendChild(badgeSpan);
        }
        const badgeSpan = summaryDiv.querySelector('.count-badge');
        if (badgeSpan) {
          badgeSpan.innerHTML = `📄 ${visibleRows} folder${visibleRows !== 1 ? 's' : ''}`;
        }
      }
    }
  };

  // override renderTable to also update the counter badge after each render
  const originalRender = renderTable;
  window.renderTable = function(filteredItems) {
    originalRender(filteredItems);
    // after dom update, update badge count
    setTimeout(() => {
      const visibleCount = document.querySelectorAll('#tableBody tr').length;
      const summaryDiv = document.querySelector('.summary');
      let badgeSpan = summaryDiv?.querySelector('.count-badge');
      if (!badgeSpan && summaryDiv) {
        badgeSpan = document.createElement('span');
        badgeSpan.className = 'count-badge';
        badgeSpan.style.marginLeft = 'auto';
        badgeSpan.style.fontSize = '0.75rem';
        badgeSpan.style.background = '#1f2a48';
        badgeSpan.style.padding = '4px 10px';
        badgeSpan.style.borderRadius = '30px';
        badgeSpan.style.fontWeight = '400';
        summaryDiv.appendChild(badgeSpan);
      }
      if (badgeSpan && summaryDiv) {
        badgeSpan.innerHTML = `📄 ${visibleCount} item${visibleCount !== 1 ? 's' : ''}`;
      } else if (summaryDiv && !badgeSpan) {
        const fallbackSpan = document.createElement('span');
        fallbackSpan.className = 'count-badge';
        fallbackSpan.textContent = `📄 ${visibleCount} item${visibleCount !== 1 ? 's' : ''}`;
        fallbackSpan.style.marginLeft = 'auto';
        fallbackSpan.style.fontSize = '0.75rem';
        fallbackSpan.style.background = '#1f2a48';
        fallbackSpan.style.padding = '4px 10px';
        fallbackSpan.style.borderRadius = '30px';
        summaryDiv.appendChild(fallbackSpan);
      }
    }, 10);
  };
  
  // reassign renderTable globally keeping original logic
  renderTable = function(filteredItems) {
    if (!filteredItems.length) {
      tableBody.innerHTML = '';
      emptyDiv.style.display = 'block';
      const summaryDiv = document.querySelector('.summary');
      let badgeSpan = summaryDiv?.querySelector('.count-badge');
      if (badgeSpan) badgeSpan.innerHTML = `📄 0 items`;
      else if (summaryDiv) {
        const newSpan = document.createElement('span');
        newSpan.className = 'count-badge';
        newSpan.textContent = `📄 0 items`;
        newSpan.style.marginLeft = 'auto';
        newSpan.style.fontSize = '0.75rem';
        newSpan.style.background = '#1f2a48';
        newSpan.style.padding = '4px 10px';
        newSpan.style.borderRadius = '30px';
        summaryDiv.appendChild(newSpan);
      }
      return;
    }
    emptyDiv.style.display = 'none';
    let rowsHtml = '';
    for (let item of filteredItems) {
      rowsHtml += `
        <tr onclick="openDrive('${item.link}')" style="cursor: pointer;">
          <td>
            <div class="file-name">
              <span class="folder-icon">${item.icon}</span>
              <span>${escapeHtml(item.name)}</span>
            </div>
          </td>
          <td><span class="type-badge">📂 ${escapeHtml(item.type)}</span></td>
          <td><span class="modified-text">${escapeHtml(item.modified)}</span></td>
        </tr>
      `;
    }
    tableBody.innerHTML = rowsHtml;
    // update counter badge
    const summaryDiv = document.querySelector('.summary');
    let badgeSpan = summaryDiv?.querySelector('.count-badge');
    if (!badgeSpan && summaryDiv) {
      badgeSpan = document.createElement('span');
      badgeSpan.className = 'count-badge';
      badgeSpan.style.marginLeft = 'auto';
      badgeSpan.style.fontSize = '0.75rem';
      badgeSpan.style.background = '#1f2a48';
      badgeSpan.style.padding = '4px 10px';
      badgeSpan.style.borderRadius = '30px';
      summaryDiv.appendChild(badgeSpan);
    }
    if (badgeSpan) {
      badgeSpan.innerHTML = `📄 ${filteredItems.length} folder${filteredItems.length !== 1 ? 's' : ''}`;
    }
  };
  
  // re-run render to attach count badge initially
  renderTable(foldersData);
  
  // also listen to search filter changes (since we replaced renderTable globally accordingly)
  // attach the filter function properly
  window.filterFolders = filterFolders;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const query = searchInput.value.trim().toLowerCase();
      if (query === "") {
        renderTable(foldersData);
        return;
      }
      const filtered = foldersData.filter(folder => 
        folder.name.toLowerCase().includes(query) ||
        folder.type.toLowerCase().includes(query) ||
        folder.modified.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }, 160);
  });
  
  // fix any possible duplication due to redefinitions but keep safe
  // final cleanup: initialization done, badge will be shown.
  // also add emoji hover effect small.
  const style = document.createElement('style');
  style.textContent = `
    tr:hover .folder-icon {
      transform: scale(1.05);
      transition: transform 0.1s ease;
    }
    .count-badge {
      transition: all 0.1s;
    }
    .drive-container {
      animation: fadeSlideUp 0.25s ease-out;
    }
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  `;
  document.head.appendChild(style);
  
  // for extra DeepSeek touch: subtle glow on search focus
  const addGlow = () => {
    const inp = document.querySelector('.search-input');
    if(inp) {
      inp.addEventListener('focus', () => {
        inp.parentElement.style.setProperty('--glow', '0 0 0 3px rgba(62,107,219,0.3)');
      });
      inp.addEventListener('blur', () => {
        inp.parentElement.style.setProperty('--glow', 'none');
      });
    }
  };
  addGlow();
